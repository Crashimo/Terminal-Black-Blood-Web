<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>404 - SYSTEM ERROR</title>

    <link rel="icon" type="image/gif" href="https://i10.glitter-graphics.org/pub/864/864430nt3rjqlypa.gif">

    <style>
        body {
            background-color: #000;
            /* TU GIF DE LLUVIA / FONDO */
            background-image: url('https://i.pinimg.com/originals/c1/1c/12/c11c12c5c19eb79463f722d25dae11ba.gif');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Capa oscura para que el GIF no sature la vista */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 1;
        }

        /* --- LA VENTANA DE ERROR ADAPTADA --- */
        .window-error {
            position: relative;
            z-index: 10;
            background: #000; 
            border: 2px solid #4f1268; /* Morado de tu código */
            box-shadow: 0 0 25px rgb(132, 0, 255); /* Brillo neón morado */
            width: 90%;
            max-width: 480px;
            padding: 0;
            text-align: left;
        }

        .window-header {
            background: #350d69; /* Tono morado oscuro */
            color: #fff;
            padding: 6px 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            border-bottom: 2px solid #4f1268;
        }

        .window-body {
            padding: 25px;
            color: #fff;
            text-shadow: 1px 1px 3px rgb(49, 4, 66);
        }

        .error-title {
            color: #8400ff;
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            display: block;
        }

        .message {
            font-size: 1rem;
            line-height: 1.4;
            margin-bottom: 20px;
            color: #ccc;
        }

        /* BOTÓN ADAPTADO */
        .back-link {
            display: block;
            text-align: center;
            color: #fff;
            text-decoration: none;
            border: 1px solid #4f1268;
            padding: 12px;
            background: rgba(53, 13, 105, 0.3);
            transition: 0.3s;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .back-link:hover {
            background: #5c1386;
            color: #fff;
            box-shadow: 0 0 15px rgb(132, 0, 255);
            cursor: pointer;
        }

        

    </style>
</head>
<body>

    <div class="window-error">
        <div class="window-header">
            <span>NULL_REFERENCE_VOID.exe</span>
            <span>[X]</span>
        </div>
        <div class="window-body">
            <span class="error-title">ERROR 404</span>
            <p class="message">† EL SISTEMA HA COLAPSADO EN EL VACÍO: parece que te has perdido por el vacío de la terminal? tranquilo... a todos nos pasa †</p>
            
            <a href="/" class="back-link">> REINTENTAR CONEXIÓN</a>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/cc9gen.mp3" type="audio/mpeg">
    </audio>

    <audio id="sfxBoton" src="https://files.catbox.moe/hgafe2.mp3"></audio>

    <script>
    const audio = document.getElementById('bgMusic');
    
    // Lo ponemos bajito para que sea ambiental (0.1 es el 10%)
    audio.volume = 1.0;

    // EL TRUCO: Los navegadores no dejan sonar música sola.
    // La música empezará en cuanto el usuario haga clic en CUALQUIER PARTE de la página.
    document.body.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            console.log("Iniciando ambiente de guardado...");
        }
    }, { once: true }); // El 'once: true' hace que esto solo pase con el primer clic
</script>

<script>
    const btn = document.querySelector('.back-link');
    const sfx = document.getElementById('sfxBoton');
    sfx.volume = 0.3;

    btn.addEventListener('click', (e) => {
        // Detenemos el salto inmediato para que dé tiempo a sonar
        e.preventDefault();
        
        // Reproducimos el sonido
        sfx.play();
        
        // Esperamos 500ms (medio segundo) para que se escuche el efecto y luego volvemos al inicio
        setTimeout(() => {
            window.location.href = "/"; 
        }, 500);
    });
</script>

<script>

btn.addEventListener('click', (e) => {
    e.preventDefault(); // Evita que la página cambie antes de que suene el audio
    sfx.play();
    
    setTimeout(() => {
        // Esto te lleva a la raíz de tu dominio (ej: tuweb.netlify.app/)
        window.location.href = "/"; 
    }, 500); // 500ms es tiempo suficiente para escuchar el clic
});

</script>

</body>
</html>
